name: Super Grid Robust Training

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:   # Manual trigger

permissions:
  contents: write

jobs:
  train-models:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Super Grid Trainer
        run: python scripts/offline_grid_trainer.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit and push models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models/
          git commit -m "🤖 Super Grid: Auto-recalibrated models [$(date -u +%Y-%m-%dT%H:%M:%SZ)]" || echo "No changes to commit"
          git fetch origin main
          git rebase --strategy-option=ours origin/main || { git rebase --abort && git merge -X ours origin/main; }
          git push
