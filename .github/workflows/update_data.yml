name: Update Market Data

on:
  schedule:
    # Every 30 minutes during IST market hours (Mon-Fri, 9:00-15:30 IST = 3:30-10:00 UTC)
    - cron: '*/30 3-10 * * 1-5'
  workflow_dispatch:   # Manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data updater
        run: python data_updater.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Check for changes
        id: check
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "📊 Auto-update market data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git pull --rebase --autostash -X theirs origin main
          git push
