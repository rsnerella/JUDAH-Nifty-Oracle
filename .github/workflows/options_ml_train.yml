name: Options ML Arsenal Training

on:
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: '30 3 * * 0'
  workflow_dispatch:   # Manual trigger

permissions:
  contents: write

jobs:
  train-options-models:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Unified Orchestrator
        run: python scripts/train_all_arsenal.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit and push all models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models/
          git commit -m "🔥 Options ML Arsenal: Auto-retrained via unified orchestrator [$(date -u +%Y-%m-%dT%H:%M:%SZ)]" || echo "No changes to commit"
          git pull --rebase --autostash -X theirs origin main
          git push
